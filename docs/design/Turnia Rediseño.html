<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Turnia · Rediseño</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Inter+Tight:wght@500;600;700;800;900&display=swap" rel="stylesheet" />

<style>
  :root {
    --tn-font: 'Inter', system-ui, sans-serif;
    --tn-font-display: 'Inter Tight', 'Inter', system-ui, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; font-family: var(--tn-font); -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
  body { background: #f6f6f4; }
  .tn-h { font-family: var(--tn-font-display); }
  .tn-noscroll::-webkit-scrollbar { display: none; }
  .tn-noscroll { scrollbar-width: none; }
  @keyframes tn-ping { 0% { transform: scale(1); opacity: .9 } 80%, 100% { transform: scale(2.4); opacity: 0 } }
  @keyframes tn-blink { 50% { opacity: 0 } }
  .tn-blink { animation: tn-blink 1s steps(2,end) infinite; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="browser-window.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="screens/icons.jsx"></script>
<script type="text/babel" src="screens/mobile.jsx"></script>
<script type="text/babel" src="screens/desktop.jsx"></script>
<script type="text/babel" src="screens/extras.jsx"></script>
<script type="text/babel" src="screens/extras2.jsx"></script>
<script type="text/babel" src="screens/extras3.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "darkMode": false,
  "accent": "indigo"
}/*EDITMODE-END*/;

const ACCENTS = {
  teal:    { primary: '#14B8A6', primaryDark: '#0F766E', label:'Teal' },
  indigo:  { primary: '#6366F1', primaryDark: '#4338CA', label:'Indigo' },
  rose:    { primary: '#F43F5E', primaryDark: '#BE123C', label:'Rose' },
  emerald: { primary: '#10B981', primaryDark: '#047857', label:'Emerald' },
};

function buildTheme(tw) {
  const a = ACCENTS[tw.accent] || ACCENTS.teal;
  if (tw.darkMode) {
    return {
      mode: 'dark',
      primary: a.primary,
      primaryDark: a.primaryDark,
      bg: '#0E1116',
      surface: '#161A22',
      subtle: '#161A22',
      subtle2: '#1F2530',
      border: '#242B36',
      borderStrong: '#2E3645',
      text: '#F2F4F7',
      textSec: '#C5CBD6',
      muted: '#8892A2',
      red: '#F87171',
      redSoft: '#7F1D1D33',
      amber: '#F59E0B',
      amberSoft: '#78350F33',
      green: '#10B981',
      greenSoft: '#064E3B33',
      blue: '#0EA5E9',
      violet: '#A78BFA',
    };
  }
  return {
    mode: 'light',
    primary: a.primary,
    primaryDark: a.primaryDark,
    bg: '#FFFFFF',
    surface: '#FFFFFF',
    subtle: '#F7F8F7',
    subtle2: '#EFF1EF',
    border: '#E6E8E5',
    borderStrong: '#CDD2CB',
    text: '#0F1115',
    textSec: '#3D4250',
    muted: '#6B7280',
    red: '#EF4444',
    redSoft: '#FEF2F2',
    amber: '#D97706',
    amberSoft: '#FFFBEB',
    green: '#059669',
    greenSoft: '#ECFDF5',
    blue: '#0EA5E9',
    violet: '#7C3AED',
  };
}

// ─────── frame helpers ───────

function Phone({ children, theme, w = 402, h = 852 }) {
  const { IOSDevice } = window;
  return (
    <IOSDevice width={w} height={h} dark={theme.mode === 'dark'}>
      <div style={{ width: '100%', height: '100%', paddingTop: 54, background: theme.bg, color: theme.text }}>
        {children}
      </div>
    </IOSDevice>
  );
}

function Browser({ children, theme, url = 'app.turnia.health', tab = 'Turnia', w = 1440, h = 900 }) {
  const { ChromeWindow } = window;
  return (
    <ChromeWindow url={url} tabs={[{ title: tab }]} width={w} height={h}>
      <div style={{ width: '100%', height: '100%', background: theme.bg, color: theme.text }}>
        {children}
      </div>
    </ChromeWindow>
  );
}

// ─────── tweaks panel ───────

function Tweaks() {
  const { TweaksPanel, TweakSection, TweakToggle, TweakRadio } = window;
  const tw = useTnTweaks();
  const set = (k, v) => tnSetTweaks({ [k]: v });
  return (
    <TweaksPanel title="Turnia · Tweaks">
      <TweakSection title="Apariencia">
        <TweakToggle label="Modo oscuro" value={tw.darkMode} onChange={v => set('darkMode', v)} />
        <TweakRadio label="Acento" value={tw.accent} options={[
          { value:'teal', label:'Teal' },
          { value:'indigo', label:'Indigo' },
          { value:'emerald', label:'Emerald' },
          { value:'rose', label:'Rose' },
        ]} onChange={v => set('accent', v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

// ─────── App ───────

// Shared tweak state via a tiny event bus on window so the App and Tweaks panel
// share the same source of truth without touching cross-origin parents.
window.__tnTweaks = window.__tnTweaks || { ...TWEAK_DEFAULTS };
window.__tnSubs = window.__tnSubs || new Set();
function tnSetTweaks(patch) {
  window.__tnTweaks = { ...window.__tnTweaks, ...patch };
  window.__tnSubs.forEach(fn => fn(window.__tnTweaks));
}
window.tnSetTweaks = tnSetTweaks;
function useTnTweaks() {
  const [tw, setTw] = useState(window.__tnTweaks);
  useEffect(() => {
    const fn = (next) => setTw({ ...next });
    window.__tnSubs.add(fn);
    return () => window.__tnSubs.delete(fn);
  }, []);
  return tw;
}

function App() {
  const tw = useTnTweaks();

  const theme = buildTheme(tw);
  document.body.style.background = theme.mode === 'dark' ? '#0B0E13' : '#EDEEEA';

  const { DCSection, DCArtboard, DesignCanvas } = window;
  const { MLogin, MHomeStaff, MCalendar, MShiftDetail, MRequestSwap, MMyRequests, MAvailability, MNotifications, MProfile, MManagerHome } = window.M;
  const { DLogin, DCalendar, DRequests, DStaffHome } = window.D;
  const X = window.X;
  const X2 = window.X2;
  const X3 = window.X3;

  const PHONE_W = 402, PHONE_H = 852;
  const DESK_W = 1440, DESK_H = 900;
  // artboard sizes need extra room for browser/phone chrome
  const PB_W = PHONE_W + 8, PB_H = PHONE_H + 8;
  const DB_W = DESK_W + 8, DB_H = DESK_H + 80; // tab bar + url bar

  return (
    <>
      <DesignCanvas
        title="Turnia · Rediseño"
        subtitle={`Aplicación de gestión de turnos médicos · ${theme.mode === 'dark' ? 'Modo oscuro' : 'Modo claro'} · Acento ${ACCENTS[tw.accent]?.label || ''}`}
      >
        <DCSection id="hero" title="Pantallas estrella">
          <DCArtboard id="d-cal" label="Manager · Calendario mensual (desktop)" width={DB_W} height={DB_H}>
            <Browser theme={theme} url="app.turnia.health/calendario" w={DESK_W} h={DESK_H}><DCalendar theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="m-home" label="Staff · Inicio (mobile)" width={PB_W} height={PB_H}>
            <Phone theme={theme}><MHomeStaff theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-detail" label="Staff · Detalle de turno" width={PB_W} height={PB_H}>
            <Phone theme={theme}><MShiftDetail theme={theme} /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="staff-mobile" title="Staff · Mobile">
          <DCArtboard id="m-login" label="Login" width={PB_W} height={PB_H}>
            <Phone theme={theme}><MLogin theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-cal" label="Mis turnos · Calendario" width={PB_W} height={PB_H}>
            <Phone theme={theme}><MCalendar theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-swap" label="Solicitar intercambio" width={PB_W} height={PB_H}>
            <Phone theme={theme}><MRequestSwap theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-req" label="Solicitudes (bandeja)" width={PB_W} height={PB_H}>
            <Phone theme={theme}><MMyRequests theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-avail" label="Disponibilidad" width={PB_W} height={PB_H}>
            <Phone theme={theme}><MAvailability theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-notif" label="Notificaciones" width={PB_W} height={PB_H}>
            <Phone theme={theme}><MNotifications theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-profile" label="Perfil" width={PB_W} height={PB_H}>
            <Phone theme={theme}><MProfile theme={theme} /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="auth" title="Autenticación · Mobile">
          <DCArtboard id="m-signup" label="Registro" width={PHONE_W} height={PHONE_H}>
            <Phone theme={theme}><X.MSignup theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-forgot" label="Olvidé mi contraseña" width={PHONE_W} height={PHONE_H}>
            <Phone theme={theme}><X.MForgotPassword theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-reset" label="Nueva contraseña" width={PHONE_W} height={PHONE_H}>
            <Phone theme={theme}><X.MResetPassword theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-invite" label="Aceptar invitación" width={PHONE_W} height={PHONE_H}>
            <Phone theme={theme}><X.MInvite theme={theme} /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="staff-extra" title="Staff · Operación">
          <DCArtboard id="m-active" label="De turno ahora" width={PHONE_W} height={PHONE_H}>
            <Phone theme={theme}><X.MActiveNow theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-daily" label="Agenda del día (timeline)" width={PHONE_W} height={PHONE_H}>
            <Phone theme={theme}><X.MDailySchedule theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-tx" label="Movimientos / Transactions" width={PHONE_W} height={PHONE_H}>
            <Phone theme={theme}><X.MTransactions theme={theme} /></Phone>
          </DCArtboard>
          <DCArtboard id="m-stats" label="Estadísticas personales" width={PHONE_W} height={PHONE_H}>
            <Phone theme={theme}><X.MStatistics theme={theme} /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="admin" title="Admin · Desktop">
          <DCArtboard id="d-members" label="Admin · Miembros" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/admin/members"><X.DAdminMembers theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-teams" label="Admin · Equipos" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/admin/teams"><X.DAdminTeams theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-types" label="Admin · Tipos de turno" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/admin/shift-types"><X.DAdminShiftTypes theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-positions" label="Admin · Puestos" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/admin/staff-positions"><X2.DAdminPositions theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-invite" label="Admin · Invitar miembros" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/admin/invite"><X2.DAdminInvite theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-settings" label="Admin · Configuración" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/admin/settings"><X2.DAdminSettings theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-audit" label="Admin · Auditoría" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/admin/audit"><X2.DAdminAudit theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-exports" label="Admin · Exportar datos" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/admin/exports"><X2.DAdminExports theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-reports" label="Admin · Reportes" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/admin/reports"><X2.DAdminReports theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-orgs" label="Superadmin · Organizaciones" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/admin/organizations"><X2.DAdminOrgs theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-perms" label="Permisos · Matriz por rol" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/permissions"><X2.DPermissions theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-viewer" label="Viewer · Vista de solo lectura" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/viewer"><X2.DViewer theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-mgr-avail" label="Manager · Disponibilidad del equipo" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/manager/availability"><X3.DManagerAvailability theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-mgr-shifts" label="Manager · Gestión de turnos" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/manager/shifts"><X3.DManagerShifts theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-tx" label="Movimientos (desktop)" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/transactions"><X3.DTransactions theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-appearance" label="⭐ Apariencia · Cambia color de acento" width={DESK_W} height={DESK_H}>
            <Browser theme={theme} url="app.turnia.health/profile/appearance"><X3.DAccentSettings theme={theme} /></Browser>
          </DCArtboard>
        </DCSection>

        <DCSection id="manager-mobile" title="Manager · Mobile">
          <DCArtboard id="m-mgr-home" label="Manager · Dashboard" width={PB_W} height={PB_H}>
            <Phone theme={theme}><MManagerHome theme={theme} /></Phone>
          </DCArtboard>
        </DCSection>

        <DCSection id="desktop" title="Desktop">
          <DCArtboard id="d-staff" label="Staff · Inicio (desktop)" width={DB_W} height={DB_H}>
            <Browser theme={theme} url="app.turnia.health/inicio" w={DESK_W} h={DESK_H}><DStaffHome theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-req" label="Solicitudes · Bandeja con detalle" width={DB_W} height={DB_H}>
            <Browser theme={theme} url="app.turnia.health/solicitudes" w={DESK_W} h={DESK_H}><DRequests theme={theme} /></Browser>
          </DCArtboard>
          <DCArtboard id="d-login" label="Login (desktop)" width={DB_W} height={DB_H}>
            <Browser theme={theme} url="app.turnia.health/login" w={DESK_W} h={DESK_H}><DLogin theme={theme} /></Browser>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <Tweaks />
    </>
  );
}

// Boot once everything is loaded
function boot() {
  if (!window.DesignCanvas || !window.IOSDevice || !window.ChromeWindow || !window.TweaksPanel || !window.M || !window.D || !window.Icons || !window.X || !window.X2 || !window.X3) {
    return setTimeout(boot, 30);
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
}
boot();
</script>

</body>
</html>
