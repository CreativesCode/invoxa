  terracotta: { accent: '#c2410c', hover: '#a8370a', soft: '#f4d9c5' },
  ochre:      { accent: '#a86b1a', hover: '#8d5712', soft: '#f0e0bf' },

const DENSITY = {
  compact:     { padScale: 0.85 },
  comfortable: { padScale: 1.0 },
  cozy:        { padScale: 1.15 },
};

function applyTokens({ accent, mode, density, logo }) {
  const root = document.documentElement;
  const a = ACCENTS[accent] || ACCENTS.terracotta;
  root.style.setProperty('--accent', a.accent);
  root.style.setProperty('--accent-hover', a.hover);
  root.style.setProperty('--accent-soft', a.soft);
  if (mode === 'dark') {
    root.style.setProperty('--bg', '#1a1410');
    root.style.setProperty('--bg-elev', '#241c16');
    root.style.setProperty('--bg-sunken', '#15100c');
    root.style.setProperty('--bg-muted', '#2d241c');
    root.style.setProperty('--line', '#3a2f24');
    root.style.setProperty('--line-strong', '#4d3f31');
    root.style.setProperty('--ink', '#f5ebd9');
    root.style.setProperty('--ink-2', '#d4c4a8');
    root.style.setProperty('--ink-3', '#9a8970');
    root.style.setProperty('--ink-4', '#6b5d4a');
    root.style.setProperty('--ink-inverse', '#1a1410');
  } else {
    root.style.setProperty('--bg', '#fbf7f0');
    root.style.setProperty('--bg-elev', '#ffffff');
    root.style.setProperty('--bg-sunken', '#f4ede0');
    root.style.setProperty('--bg-muted', '#efe7d6');
    root.style.setProperty('--line', '#e6dcc6');
    root.style.setProperty('--line-strong', '#d4c8ad');
    root.style.setProperty('--ink', '#2a1f17');
    root.style.setProperty('--ink-2', '#4a3a2c');
    root.style.setProperty('--ink-3', '#7a6a58');
    root.style.setProperty('--ink-4', '#a89980');
    root.style.setProperty('--ink-inverse', '#fbf7f0');
  }
}

      <TweaksPanel title="Tweaks · Invoxa">
        <TweakSection title={tweaks.lang === 'es' ? 'Idioma' : 'Language'}>
          <TweakRadio label="Lang" value={tweaks.lang} options={[
            { value: 'es', label: 'Español' }, { value: 'en', label: 'English' },
          ]} onChange={v => setTweak('lang', v)}/>
        </TweakSection>
        <TweakSection title={tweaks.lang === 'es' ? 'Modo' : 'Mode'}>
          <TweakRadio label={tweaks.lang === 'es' ? 'Apariencia' : 'Appearance'} value={tweaks.mode} options={[
            { value: 'light', label: tweaks.lang === 'es' ? 'Claro' : 'Light' },
            { value: 'dark', label: tweaks.lang === 'es' ? 'Oscuro' : 'Dark' },
          ]} onChange={v => setTweak('mode', v)}/>
        </TweakSection>
        <TweakSection title={tweaks.lang === 'es' ? 'Color de acento' : 'Accent color'}>
          <TweakColor label={tweaks.lang === 'es' ? 'Acento' : 'Accent'} value={tweaks.accent}
            options={[
              { value: 'terracotta', color: '#c2410c' },
              { value: 'ochre',      color: '#a86b1a' },
              { value: 'forest',     color: '#3d6b4a' },
            ]}
            onChange={v => setTweak('accent', v)}/>
        </TweakSection>
        <TweakSection title={tweaks.lang === 'es' ? 'Densidad' : 'Density'}>
          <TweakRadio label={tweaks.lang === 'es' ? 'Espaciado' : 'Spacing'} value={tweaks.density} options={[
            { value: 'compact', label: tweaks.lang === 'es' ? 'Compacto' : 'Compact' },
            { value: 'comfortable', label: tweaks.lang === 'es' ? 'Normal' : 'Normal' },
            { value: 'cozy', label: tweaks.lang === 'es' ? 'Amplio' : 'Cozy' },
          ]} onChange={v => setTweak('density', v)}/>
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

</body>
</html>
